<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DescubraDV</title>
  <link rel="stylesheet" href="parte.css">
</head>
<body>

  <div class="container">

    <div class="content">
      <img src="logo.png" alt="Logo DescubraDV" class="logo">
    </div>

    <div class="formulario">
      <h1>DescubraDV</h1>
      <h2>Faça login para acessar o conteúdo</h2>
      <p>Acesse e descubra os selos que contam a história da nossa cidade!</p>
    </div>

    <form>
      <div class="campo">
        <label for="usuario">Usuário</label>
        <input type="text" id="usuario" name="usuario" placeholder="Digite seu usuário" required>
      </div>

      <div class="campo">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
      </div>

      <a href="#" class="esqueci">Esqueci minha senha</a>

      <button type="submit">Entrar</button>
<a href="admin-login.html" class="acesso-admin">Acesso administrativo</a>

    </form>

  </div>

</body>
</html>
